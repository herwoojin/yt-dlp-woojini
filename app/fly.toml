# Fly.io 배포 설정. `cd app && fly launch --copy-config --no-deploy` 로 첫 셋업.
# app 이름은 fly.io 전역에서 고유해야 하므로, fly launch가 알아서 prompt를 띄움
# (또는 -name 옵션으로 지정 가능).
app = "ytdlp-25y"
primary_region = "nrt"  # Tokyo: 한국에서 가장 가까운 region

[build]
  dockerfile = "Dockerfile"

# 런타임 env vars (비밀이 아닌 것)
[env]
  # 구글 로그인 제거 → 비밀번호(2525) 입장으로 복귀. 토큰 불필요(모두 공용).
  ALLOW_INSECURE_AUTH = "true"
  FIREBASE_PROJECT_ID = "poetic-sentinel-468112-a1"
  TELEGRAM_ENABLED = "false"
  DOWNLOAD_DIR = "/data/downloads"
  # CORS: 25y.netlify.app과 모든 netlify deploy preview 허용 (regex)
  ALLOWED_ORIGINS = "https://25y.netlify.app"
  # ALLOWED_ORIGIN_REGEX는 코드 기본값(*.netlify.app | *.trycloudflare.com) 그대로 사용

# 비밀은 `fly secrets set GEMINI_API_KEY=...` 로 설정 (선택)

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"      # idle 시 컨테이너 정지 → 무료 티어 보호
  auto_start_machines = true       # 요청 들어오면 자동 기동 (~3초 cold start)
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024  # ffmpeg/yt-dlp 안정성 위해 1GB

# 영구 저장소: 다운로드한 영상/자막/HTML 결과물
[mounts]
  source = "ytdlp_data"
  destination = "/data"
