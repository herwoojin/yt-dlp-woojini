<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>yt-dlp web</title>
<script type="module">
  // yt-dlp webapp 프론트엔드 (단일 HTML)
  // Netlify 정적 배포 + 사용자별 Gemini API 키 지원

  const cfg = JSON.parse(localStorage.getItem('ytdlp_cfg') || '{}')
  let BASE = cfg.base || ''
  let BASE_SOURCE = 'localStorage'  // 'auto' | 'localStorage'
  const GEMINI_KEY = cfg.gemini_key || ''

  // tunnel.json은 cloudflared 재시작 시 자동 게시되는 현재 백엔드 URL이다.
  // - Netlify (/tunnel.json)는 최신 deploy의 정적 파일 → 리빌드 완료 후에만 최신값
  // - GitHub raw는 push 즉시 반영 → "정답" 역할
  // 두 값이 다르면 Netlify가 리빌드 중이라고 판단하고 진행 배너를 표시한다.
  const GITHUB_RAW_TUNNEL = 'https://raw.githubusercontent.com/herwoojin/yt-dlp-woojini/master/app/frontend-html/tunnel.json'

  async function fetchTunnelJson(url) {
    try {
      const r = await fetch(url, { cache: 'no-store' })
      if (!r.ok) return null
      const j = await r.json()
      if (!j || !j.base) return null
      return { base: String(j.base).replace(/\/$/, ''), updated: j.updated || null }
    } catch (_) { return null }
  }

  async function checkRebuildState() {
    const [netlify, github] = await Promise.all([
      fetchTunnelJson('/tunnel.json'),
      fetchTunnelJson(GITHUB_RAW_TUNNEL),
    ])
    if (!github && !netlify) return null
    const truth = github || netlify
    const rebuilding = !!(github && (!netlify || netlify.base !== github.base))
    return { rebuilding, canonical: truth, netlify, github }
  }

  async function discoverTunnelUrl() {
    const s = await checkRebuildState()
    return s ? s.canonical.base : null
  }

  async function ensureBase() {
    // 사용자가 명시적으로 설정한 base가 있으면 그것을 우선
    if (cfg.base) { BASE = cfg.base.replace(/\/$/, ''); BASE_SOURCE = 'localStorage'; return }
    const s = await checkRebuildState()
    if (s) {
      BASE = s.canonical.base
      BASE_SOURCE = 'auto'
      if (s.rebuilding) startRebuildBanner(s)
    }
  }

  // ─── 리빌드 진행 배너 ───────────────────────────────
  let rebuildPoll = null
  function startRebuildBanner(state) {
    const banner = $('#rebuildBanner')
    const reloadBtn = $('#rebuildBannerReload')
    const text = $('#rebuildBannerText')
    const startedAt = state.github && state.github.updated
      ? new Date(state.github.updated).getTime()
      : Date.now()
    banner.hidden = false

    const tick = async () => {
      const elapsed = Math.max(0, Math.round((Date.now() - startedAt) / 1000))
      const fresh = await checkRebuildState()
      if (fresh && !fresh.rebuilding) {
        clearInterval(rebuildPoll); rebuildPoll = null
        text.textContent = `✅ 백엔드 URL 업데이트가 Netlify에 반영되었습니다 (${elapsed}초 소요).`
        reloadBtn.hidden = false
        return
      }
      const url = (fresh && fresh.canonical && fresh.canonical.base) || state.canonical.base
      text.textContent = `🔄 새 백엔드 URL 감지 → Netlify 리빌드 진행 중 (${elapsed}초 경과)\n   → ${url}`
    }
    tick()
    rebuildPoll = setInterval(tick, 5000)
  }

  async function api(path, init = {}) {
    const headers = { 'Content-Type': 'application/json', ...(init.headers || {}) }
    if (GEMINI_KEY) headers['X-Gemini-Key'] = GEMINI_KEY
    try {
      const r = await fetch(BASE + path, { ...init, headers })
      if (!r.ok) throw new Error(`${r.status} ${await r.text()}`)
      return r.json()
    } catch (err) {
      // 네트워크 오류면 tunnel URL이 바뀐 것일 수 있으므로 재발견 후 1회 재시도
      if (BASE_SOURCE === 'auto' || !cfg.base) {
        const fresh = await discoverTunnelUrl()
        if (fresh && fresh !== BASE) {
          BASE = fresh
          BASE_SOURCE = 'auto'
          const r2 = await fetch(BASE + path, { ...init, headers })
          if (!r2.ok) throw new Error(`${r2.status} ${await r2.text()}`)
          return r2.json()
        }
      }
      throw err
    }
  }

  const $ = (sel) => document.querySelector(sel)
  const list = $('#jobs')
  const status = $('#status')

  // ─── 설정 모달 ────────────────────────────────────
  const settingsModal = $('#settingsModal')
  $('#cfgBtn').onclick = () => {
    $('#cfgBase').value = BASE
    $('#cfgGeminiKey').value = GEMINI_KEY
    settingsModal.showModal()
  }
  $('#cfgClose').onclick = () => settingsModal.close()
  $('#cfgSave').onclick = () => {
    const newCfg = {
      base: $('#cfgBase').value.trim().replace(/\/$/, ''),
      gemini_key: $('#cfgGeminiKey').value.trim(),
    }
    localStorage.setItem('ytdlp_cfg', JSON.stringify(newCfg))
    settingsModal.close()
    location.reload()
  }
  $('#toggleKey').onclick = () => {
    const inp = $('#cfgGeminiKey')
    inp.type = inp.type === 'password' ? 'text' : 'password'
    $('#toggleKey').textContent = inp.type === 'password' ? '👁' : '🙈'
  }

  // ─── API 키 경고 배너 ─────────────────────────────
  function maybeShowKeyWarning() {
    if (!GEMINI_KEY && BASE && !BASE.includes('localhost') && !BASE.includes('127.0.0.1')) {
      $('#keyWarning').style.display = 'block'
    }
  }
  $('#keyWarningBtn').onclick = () => {
    settingsModal.showModal()
    $('#cfgGeminiKey').focus()
  }

  // ─── 작업 등록 ────────────────────────────────────
  $('#form').onsubmit = async (e) => {
    e.preventDefault()
    const url = $('#url').value.trim()
    const quality = $('#quality').value
    if (!url) return
    status.textContent = '등록 중...'
    try {
      const body = { url, quality }
      if (GEMINI_KEY) body.gemini_api_key = GEMINI_KEY
      await api('/api/jobs', { method: 'POST', body: JSON.stringify(body) })
      $('#url').value = ''
      status.textContent = '등록됨 ✅'
      await refresh()
    } catch (err) {
      status.textContent = '실패: ' + err.message
    }
  }

  async function refresh() {
    try {
      const jobs = await api('/api/jobs')
      list.innerHTML = jobs.length === 0
        ? '<li style="color:#888;text-align:center;padding:24px">작업이 없습니다.</li>'
        : jobs.map(renderJob).join('')
      list.querySelectorAll('[data-id]').forEach((el) => {
        el.onclick = () => openDetail(el.dataset.id)
      })
    } catch (err) {
      if (BASE === '') {
        status.textContent = '⚠️ 서버 설정 필요 — ⚙️ 버튼을 눌러 백엔드 URL을 입력하세요'
      } else {
        status.textContent = '연결 실패: ' + err.message
      }
    }
  }

  function renderJob(j) {
    const pct = Math.round(j.progress * 100)
    return `<li data-id="${j.id}" class="job">
      <div class="row">
        <strong>${escape(j.title || j.url)}</strong>
        <span class="badge st-${j.status}">${j.status}</span>
      </div>
      <div class="meta">${escape(j.url)}</div>
      ${j.status !== 'done' && j.status !== 'failed'
        ? `<div class="bar"><div style="width:${pct}%"></div></div>`
        : ''}
      ${j.message ? `<div class="meta">${escape(j.message)}</div>` : ''}
    </li>`
  }

  async function openDetail(id) {
    const j = await api('/api/jobs/' + id)
    const dlg = $('#detail')
    $('#dTitle').textContent = j.title || j.url
    $('#dMeta').textContent = `${j.status} · ${Math.round(j.progress * 100)}% · Gemini ${j.quality}`
    $('#dChapters').innerHTML = j.chapters.map(c =>
      `<li><code>${c.time}</code> <b>${escape(c.title)}</b>${c.summary ? ' — ' + escape(c.summary) : ''}</li>`).join('')
    $('#dArtifacts').innerHTML = j.artifacts.map(a => `
      <li>
        <span>${escape(a.kind)} — ${escape(a.filename)}</span>
        <a href="${BASE}/api/files/${j.id}/${encodeURIComponent(a.filename)}" download>다운로드</a>
      </li>`).join('')
    const zipBtn = $('#dDownloadAll')
    if (j.artifacts.length > 0) {
      zipBtn.href = `${BASE}/api/files/${j.id}/_archive.zip`
      zipBtn.style.display = ''
    } else {
      zipBtn.style.display = 'none'
    }
    dlg.showModal()
  }
  $('#dClose').onclick = () => $('#detail').close()

  function escape(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) }

  ensureBase().then(() => {
    maybeShowKeyWarning()
    refresh()
    setInterval(refresh, 3000)
  })
</script>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f8fafc; margin:0; padding:16px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  h1 { font-size:18px; margin:0 }
  form { background:#fff; border-radius:16px; box-shadow:0 1px 3px rgba(0,0,0,.06); padding:14px; }
  form input, form select { width:100%; padding:12px; border:1px solid #cbd5e1; border-radius:10px; font-size:15px; box-sizing:border-box; margin-top:6px; }
  form .row2 { display:flex; gap:8px; margin-top:10px; }
  form .row2 select { width:auto; flex:1 }
  form button { flex:2; padding:12px; background:#059669; color:#fff; border:0; border-radius:10px; font-weight:600; cursor:pointer }
  form button:hover { background:#047857 }
  ul { list-style:none; padding:0; margin:12px 0; display:flex; flex-direction:column; gap:8px }
  .job { background:#fff; border-radius:12px; padding:12px; cursor:pointer; transition:box-shadow .2s }
  .job:hover { box-shadow:0 2px 8px rgba(0,0,0,.08) }
  .row { display:flex; justify-content:space-between; align-items:center; gap:8px }
  .meta { color:#64748b; font-size:12px; word-break:break-all }
  .badge { font-size:11px; padding:2px 8px; border-radius:999px; background:#e2e8f0 }
  .st-done { background:#d1fae5; color:#065f46 } .st-failed { background:#fee2e2; color:#991b1b }
  .st-downloading { background:#dbeafe; color:#1e40af } .st-generating { background:#ede9fe; color:#5b21b6 }
  .st-pending { background:#fef3c7; color:#92400e } .st-transcribing { background:#e0e7ff; color:#3730a3 }
  .bar { height:6px; background:#e2e8f0; border-radius:999px; margin-top:6px; overflow:hidden }
  .bar > div { height:100%; background:#0f172a; transition:width .3s }
  dialog { border:0; border-radius:16px; padding:20px; max-width:min(640px, 92vw); width:100% }
  dialog::backdrop { background:rgba(0,0,0,.4) }
  #dArtifacts li, #dChapters li { padding:6px 0; border-bottom:1px solid #f1f5f9; font-size:14px }
  #dArtifacts li { display:flex; justify-content:space-between; gap:8px }
  button.icon { background:none; border:1px solid #cbd5e1; padding:6px 10px; border-radius:8px; font-size:12px; cursor:pointer }
  button.icon:hover { background:#f1f5f9 }
  #status { font-size:12px; color:#64748b; min-height:1em; margin-top:6px }

  /* 설정 모달 */
  .settings-form { display:flex; flex-direction:column; gap:14px; margin-top:12px }
  .settings-form label { font-size:13px; font-weight:600; color:#334155 }
  .settings-form input { width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px; font-size:14px }
  .settings-form .hint { font-size:11px; color:#94a3b8; margin-top:2px }
  .key-row { display:flex; gap:6px; align-items:center }
  .key-row input { flex:1 }
  .key-row button { padding:8px 10px; background:none; border:1px solid #cbd5e1; border-radius:8px; cursor:pointer; font-size:14px }
  .btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:8px }
  .btn-primary { padding:10px 20px; background:#059669; color:#fff; border:0; border-radius:8px; font-weight:600; cursor:pointer }
  .btn-primary:hover { background:#047857 }
  .btn-secondary { padding:10px 20px; background:#f1f5f9; color:#334155; border:1px solid #cbd5e1; border-radius:8px; cursor:pointer }

  /* API 키 경고 배너 */
  .key-warning { display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:12px; padding:12px 14px; margin-bottom:12px; font-size:13px; color:#92400e }
  .key-warning button { background:#f59e0b; color:#fff; border:0; padding:6px 14px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; margin-left:8px }

  /* Netlify 리빌드 진행 배너 */
  .rebuild-banner { display:flex; align-items:center; gap:8px; background:#e0f2fe; border:1px solid #7dd3fc; border-radius:12px; padding:10px 14px; margin-bottom:12px; font-size:12px; color:#075985; white-space:pre-line }
  .rebuild-banner[hidden] { display:none }
  .rebuild-banner button { margin-left:auto; padding:6px 12px; background:#0284c7; color:#fff; border:0; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; flex-shrink:0 }
  .rebuild-banner button:hover { background:#0369a1 }

  /* 연결 상태 */
  .conn-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px }
  .conn-ok { background:#10b981 }
  .conn-fail { background:#ef4444 }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎬 yt-dlp webapp</h1>
    <button id="cfgBtn" class="icon">⚙️ 설정</button>
  </header>

  <div id="rebuildBanner" class="rebuild-banner" hidden>
    <span id="rebuildBannerText">🔄 업데이트 확인 중...</span>
    <button id="rebuildBannerReload" hidden onclick="location.reload()">새로고침</button>
  </div>

  <div id="keyWarning" class="key-warning">
    🔑 Gemini API 키가 설정되지 않았습니다. 요약/목차 생성을 위해 키를 입력해 주세요.
    <button id="keyWarningBtn">키 설정하기</button>
  </div>

  <form id="form">
    <label>YouTube URL</label>
    <input id="url" type="url" required placeholder="https://www.youtube.com/watch?v=..." />
    <div class="row2">
      <select id="quality">
        <option value="flash">Flash (기본/빠름)</option>
        <option value="pro">Pro (고품질)</option>
      </select>
      <button type="submit">시작</button>
    </div>
    <div id="status"></div>
  </form>

  <ul id="jobs"></ul>
</div>

<!-- 작업 상세 모달 -->
<dialog id="detail">
  <div class="row"><strong id="dTitle"></strong><button id="dClose" class="icon">닫기</button></div>
  <div id="dMeta" class="meta" style="margin:8px 0"></div>
  <h3 style="font-size:14px">📚 시계열 목차</h3>
  <ul id="dChapters"></ul>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
    <h3 style="font-size:14px;margin:0">📦 산출물</h3>
    <a id="dDownloadAll" class="btn-primary" style="padding:6px 12px;font-size:12px;text-decoration:none;display:none" download>📦 전체 ZIP 다운로드</a>
  </div>
  <ul id="dArtifacts"></ul>
</dialog>

<!-- 설정 모달 -->
<dialog id="settingsModal">
  <div class="row">
    <strong style="font-size:16px">⚙️ 설정</strong>
    <button id="cfgClose" class="icon">닫기</button>
  </div>
  <div class="settings-form">
    <div>
      <label>🌐 백엔드 서버 URL</label>
      <input id="cfgBase" type="url" placeholder="https://your-tunnel.trycloudflare.com" />
      <div class="hint">비워두면 현재 페이지와 같은 서버를 사용합니다. Netlify에서는 Cloudflare 터널 URL을 입력하세요.</div>
    </div>
    <div>
      <label>🔑 Gemini API 키</label>
      <div class="key-row">
        <input id="cfgGeminiKey" type="password" placeholder="AIza..." />
        <button id="toggleKey" type="button">👁</button>
      </div>
      <div class="hint">
        <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a>에서 무료로 발급받을 수 있습니다.
        키는 이 브라우저에만 저장되며 서버에 저장되지 않습니다.
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="document.getElementById('settingsModal').close()">취소</button>
      <button id="cfgSave" class="btn-primary" type="button">저장</button>
    </div>
  </div>
</dialog>
</body>
</html>
