<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>📚 멀티 영상 블로그 스튜디오 — [JINI+US]</title>
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#7c3aed" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="JINI+US 블로그" />
<link rel="icon" type="image/svg+xml" href="/icon.svg" />
<link rel="apple-touch-icon" href="/icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script type="module">
  // ── 멀티 영상 → 하나의 long blog 생성 스튜디오 (단일 HTML) ──
  // index.html 과 동일한 백엔드 연결 방식(tunnel.json 발견 + 사용자 설정)을 재사용한다.

  // ─── 사이트 잠금 상태 공유 (index.html 과 동일 키) ───
  const isUnlocked = () => sessionStorage.getItem('ytdlp_unlocked') === '1'

  const cfg = JSON.parse(localStorage.getItem('ytdlp_cfg') || '{}')
  let BASE = cfg.base || ''
  const GEMINI_KEY = cfg.gemini_key || ''
  const FALLBACK_BASE = 'https://ytdlp-25y.fly.dev'  // 터널이 죽어도 항상 살아있는 영구 백엔드

  const GITHUB_RAW_TUNNEL = 'https://raw.githubusercontent.com/herwoojin/yt-dlp-woojini/master/app/frontend-html/tunnel.json'

  async function fetchTunnelJson(url) {
    try {
      const r = await fetch(url, { cache: 'no-store' })
      if (!r.ok) return null
      const j = await r.json()
      if (!j || !j.base) return null
      return { base: String(j.base).replace(/\/$/, ''), updated: j.updated || null }
    } catch (_) { return null }
  }

  async function discoverTunnelUrl() {
    const [netlify, github] = await Promise.all([
      fetchTunnelJson('/tunnel.json'),
      fetchTunnelJson(GITHUB_RAW_TUNNEL),
    ])
    const truth = github || netlify
    return truth ? truth.base : null
  }

  async function ensureBase() {
    const isLocal = ['localhost', '127.0.0.1'].includes(window.location.hostname) || window.location.hostname.startsWith('192.168.') || window.location.hostname.startsWith('10.');
    if (isLocal && !cfg.base) {
      BASE = window.location.origin;
      console.log('Local backend detected in studio:', BASE);
      return;
    }
    if (cfg.base) { BASE = cfg.base.replace(/\/$/, ''); return }
    const found = await discoverTunnelUrl()
    if (found) BASE = found
  }

  // ─── API helper (index.html 의 api() 와 동일한 헤더/재발견 전략) ───
  async function _parseResp(r) {
    if (!r.ok) throw new Error(`${r.status} ${await r.text()}`)
    if (r.status === 204 || r.headers.get('content-length') === '0') return null
    const ct = r.headers.get('content-type') || ''
    return ct.includes('application/json') ? r.json() : r.text()
  }
  async function api(path, init = {}) {
    const headers = { 'Content-Type': 'application/json', ...(init.headers || {}) }
    if (GEMINI_KEY) headers['X-Gemini-Key'] = GEMINI_KEY
    try {
      return await _parseResp(await fetch(BASE + path, { ...init, headers }))
    } catch (err) {
      // 후보 순서대로: ① tunnel.json 자동발견 ② 고정 fly.dev fallback
      const tried = new Set([BASE])
      const candidates = []
      const fresh = await discoverTunnelUrl()
      if (fresh && !tried.has(fresh)) candidates.push(fresh)
      if (!tried.has(FALLBACK_BASE)) candidates.push(FALLBACK_BASE)
      for (const cand of candidates) {
        if (tried.has(cand)) continue
        tried.add(cand)
        const attempts = cand === FALLBACK_BASE ? 2 : 1
        for (let k = 0; k < attempts; k++) {
          try {
            const res = await _parseResp(await fetch(cand + path, { ...init, headers }))
            BASE = cand
            return res
          } catch (_) {
            if (k < attempts - 1) await new Promise(r => setTimeout(r, 1500))
          }
        }
      }
      throw err
    }
  }

  const $ = (sel) => document.querySelector(sel)
  const escape = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))

  // ─── 설정 모달 (index.html 과 동일 cfg 공유) ───
  const settingsModal = $('#settingsModal')
  $('#cfgBtn').onclick = () => {
    $('#cfgBase').value = BASE
    $('#cfgGeminiKey').value = GEMINI_KEY
    settingsModal.showModal()
  }
  $('#cfgClose').onclick = () => settingsModal.close()
  $('#cfgSave').onclick = () => {
    const newCfg = {
      base: $('#cfgBase').value.trim().replace(/\/$/, ''),
      gemini_key: $('#cfgGeminiKey').value.trim(),
    }
    localStorage.setItem('ytdlp_cfg', JSON.stringify(newCfg))
    settingsModal.close()
    location.reload()
  }
  $('#toggleKey').onclick = () => {
    const inp = $('#cfgGeminiKey')
    inp.type = inp.type === 'password' ? 'text' : 'password'
    $('#toggleKey').textContent = inp.type === 'password' ? '👁' : '🙈'
  }

  // ─── URL 입력 행 관리 ───
  const urlList = $('#urlList')
  function addUrlRow(value = '') {
    const row = document.createElement('div')
    row.className = 'url-row'
    row.innerHTML = `
      <span class="url-num"></span>
      <input type="url" class="url-input" placeholder="https://www.youtube.com/watch?v=..." value="${escape(value)}" />
      <button type="button" class="url-del" title="삭제">🗑</button>`
    row.querySelector('.url-del').onclick = () => { row.remove(); renumber() }
    urlList.appendChild(row)
    renumber()
    return row
  }
  function renumber() {
    [...urlList.querySelectorAll('.url-row')].forEach((r, i) => {
      r.querySelector('.url-num').textContent = (i + 1) + '.'
    })
  }
  $('#addUrlBtn').onclick = () => addUrlRow()
  addUrlRow(); addUrlRow()   // 기본 2칸

  // ─── 상태 표시 ───
  const statusBox = $('#statusBox')
  const progressList = $('#progressList')
  function setStatus(html) { statusBox.innerHTML = html }
  function setProgress(items) {
    progressList.innerHTML = items.map(it => {
      const icon = { wait: '⏳', work: '🔄', done: '✅', fail: '❌' }[it.state] || '•'
      const cls = it.state === 'fail' ? 'pg-fail' : (it.state === 'done' ? 'pg-done' : '')
      return `<li class="${cls}"><span class="pg-icon">${icon}</span>
        <span class="pg-label">${escape(it.label)}</span>
        <span class="pg-msg">${escape(it.msg || '')}</span></li>`
    }).join('')
  }

  // ─── job 하나가 done 될 때까지 polling ───
  async function waitForJob(jobId, onTick) {
    while (true) {
      const j = await api('/api/jobs/' + jobId)
      onTick(j)
      if (j.status === 'done') return j
      if (j.status === 'failed') throw new Error(j.error || j.message || '분석 실패')
      if (j.status === 'cancelled') throw new Error(j.message || '중지됨')
      await new Promise(r => setTimeout(r, 3000))
    }
  }

  // ─── blog_long.html 본문만 추출 + 이미지 src 절대경로화 ───
  function extractBody(fullHtml) {
    const m = fullHtml.match(/<body[^>]*>([\s\S]*?)<\/body>/i)
    let body = m ? m[1] : fullHtml
    // 상대 /api/ 경로 → 절대 BASE 경로 (Netlify에서 열어도 이미지가 보이도록)
    body = body.replace(/(src|href)=(["'])\/api\//g, `$1=$2${BASE}/api/`)
    return body.trim()
  }

  let combinedSections = []   // {title, url, jobId, body}
  let combinedTitle = ''

  // ─── 진행 상태 보존 (페이지 이탈 후 돌아와도 이어받기) ───
  // 무거운 HTML 본문은 저장하지 않고, jobId만 저장해 복귀 시 백엔드에서 다시 가져온다.
  const RUN_KEY = 'ytdlp_blog_run'
  let currentRun = null  // { title, quality, status:'running'|'done', items:[{label,msg,state,url,jobId}] }
  const saveRun = () => { if (currentRun) try { localStorage.setItem(RUN_KEY, JSON.stringify(currentRun)) } catch (_) {} }
  const clearRun = () => { currentRun = null; try { localStorage.removeItem(RUN_KEY) } catch (_) {} }
  const loadRun = () => { try { return JSON.parse(localStorage.getItem(RUN_KEY) || 'null') } catch (_) { return null } }

  function buildCombinedHtml({ forDownload }) {
    const title = combinedTitle || '통합 블로그'
    const toc = combinedSections.map((s, i) =>
      `<li><a href="#sec-${i}">${escape(s.title || ('영상 ' + (i + 1)))}</a></li>`).join('')
    const sections = combinedSections.map((s, i) => `
      <section id="sec-${i}" class="blog-section">
        <div class="sec-source">▶ 원본 영상: <a href="${escape(s.url)}" target="_blank" rel="noopener">${escape(s.url)}</a></div>
        ${s.body}
      </section>
      ${i < combinedSections.length - 1 ? '<hr class="sec-divider" />' : ''}`).join('\n')

    const inner = `
      <h1 class="combined-h1">📚 ${escape(title)}</h1>
      <p class="combined-sub">${combinedSections.length}개의 유튜브 영상을 분석해 하나로 묶은 블로그입니다.</p>
      <nav class="combined-toc">
        <strong>목차</strong>
        <ol>${toc}</ol>
      </nav>
      ${sections}`

    if (!forDownload) return inner

    // 다운로드용: 완전한 HTML5 문서로 감싸기
    return `<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>${escape(title)}</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; max-width: 820px; margin: 24px auto; padding: 0 16px; line-height: 1.7; color: #1f2937; }
  h1,h2,h3 { line-height: 1.3 }
  a { color: #0369a1 }
  img { max-width: 100%; border-radius: 8px }
  .combined-h1 { text-align:center; margin-bottom:8px }
  .combined-sub { text-align:center; color:#64748b; margin-top:0 }
  .combined-toc { background:#f5f3ff; border:1px solid #ddd6fe; border-radius:12px; padding:14px 18px; margin:24px 0 }
  .combined-toc ol { margin:8px 0 0; padding-left:20px }
  .combined-toc a { text-decoration:none }
  .blog-section { margin:32px 0 }
  .sec-source { font-size:12px; color:#94a3b8; background:#f8fafc; border-radius:8px; padding:8px 12px; margin-bottom:16px; word-break:break-all }
  .sec-divider { border:0; border-top:2px dashed #e2e8f0; margin:40px 0 }
</style>
</head>
<body>
${inner}
</body>
</html>`
  }

  // ─── 메인 실행 ───
  const runBtn = $('#runBtn')
  const previewCard = $('#previewCard')
  const previewFrame = $('#previewFrame')
  const downloadBtn = $('#downloadBtn')
  const openTabBtn = $('#openTabBtn')

  // 완료된 job 에서 blog_long.html 을 가져와 섹션으로 추가 (순서 유지)
  async function addSectionFromJob(it, idx, doneJob) {
    const job = doneJob || await api('/api/jobs/' + it.jobId)
    const hasBlog = (job.artifacts || []).some(a => a.filename === 'blog_long.html')
    if (!hasBlog) throw new Error('blog_long.html 산출물이 없습니다')
    const fullHtml = await api(`/api/files/${it.jobId}/preview/blog_long.html`)
    combinedSections.push({
      title: job.title || it.label || `영상 ${idx + 1}`,
      url: it.url,
      jobId: it.jobId,
      body: extractBody(fullHtml),
    })
  }

  // currentRun 을 끝까지 처리(신규 실행/복귀 이어받기 공용). 각 단계마다 saveRun() 으로 상태 보존.
  async function processRun() {
    const run = currentRun
    if (!run) return
    combinedTitle = run.title || ''
    runBtn.disabled = true
    runBtn.textContent = '⏳ 블로그 생성 중...'
    $('#studioCard').classList.add('loading-glow')
    setProgress(run.items)
    try {
      for (let i = 0; i < run.items.length; i++) {
        const it = run.items[i]
        if (it.state === 'fail') continue
        if (it.state === 'done' && it.jobId) {
          // 복귀: 이미 끝난 영상은 본문만 다시 받아 섹션 복원
          if (!combinedSections.some(s => s.jobId === it.jobId)) {
            try { await addSectionFromJob(it, i) }
            catch (err) { it.state = 'fail'; it.msg = '복원 실패: ' + err.message; saveRun() }
          }
          setProgress(run.items)
          continue
        }
        // 진행/대기 영상: jobId 있으면 이어서 polling, 없으면 새로 등록
        it.state = 'work'; saveRun()
        try {
          if (!it.jobId) {
            it.msg = '작업 등록 중'; setProgress(run.items)
            const job = await api('/api/jobs', { method: 'POST', body: JSON.stringify({ url: it.url, quality: run.quality }) })
            it.jobId = job.id; saveRun()
          }
          const done = await waitForJob(it.jobId, (j) => {
            const pct = Math.round((j.progress || 0) * 100)
            const map = { pending: '대기', downloading: '다운로드', transcribing: '자막 분석', generating: 'AI 생성' }
            it.msg = `${map[j.status] || j.status} ${pct}%`
            if (j.title) it.label = j.title.slice(0, 40)
            setProgress(run.items); saveRun()
          })
          await addSectionFromJob(it, i, done)
          it.state = 'done'; it.msg = '완료 ✅'; setProgress(run.items); saveRun()
        } catch (err) {
          it.state = 'fail'; it.msg = err.message; setProgress(run.items); saveRun()
        }
      }

      if (combinedSections.length === 0) {
        setStatus('❌ 생성된 블로그가 없습니다. URL/연결/Gemini 키를 확인하세요.')
        run.status = 'done'; saveRun()
        return
      }
      previewFrame.srcdoc = buildCombinedHtml({ forDownload: true })
      previewCard.hidden = false
      setStatus(`🎉 완료! ${combinedSections.length}개 영상이 하나의 블로그로 합쳐졌습니다.`)
      run.status = 'done'; saveRun()
      previewCard.scrollIntoView({ behavior: 'smooth', block: 'start' })
    } finally {
      $('#studioCard').classList.remove('loading-glow')
      runBtn.disabled = false
      runBtn.textContent = '📚 통합 블로그 생성'
    }
  }

  runBtn.onclick = async () => {
    const urls = [...urlList.querySelectorAll('.url-input')]
      .map(i => i.value.trim()).filter(Boolean)
    if (urls.length === 0) { setStatus('⚠️ 유튜브 URL을 최소 1개 이상 입력하세요.'); return }

    combinedTitle = $('#blogTitle').value.trim()
    combinedSections = []
    previewCard.hidden = true
    currentRun = {
      title: combinedTitle,
      quality: $('#quality').value,
      status: 'running',
      items: urls.map((u, i) => ({ label: `영상 ${i + 1}`, msg: '대기 중', state: 'wait', url: u, jobId: null })),
    }
    saveRun()
    setStatus(`🚀 ${urls.length}개 영상 분석을 시작합니다. 영상 길이에 따라 수 분 걸릴 수 있어요.`)
    await processRun()
  }

  // 복귀 시 저장된 진행 상태 이어받기
  async function maybeResumeRun() {
    const saved = loadRun()
    if (!saved || !Array.isArray(saved.items) || saved.items.length === 0) return false
    currentRun = saved
    combinedSections = []
    combinedTitle = saved.title || ''
    $('#blogTitle').value = saved.title || ''
    const qsel = $('#quality'); if (qsel && saved.quality) qsel.value = saved.quality
    urlList.innerHTML = ''
    saved.items.forEach(it => addUrlRow(it.url))
    const anyActive = saved.items.some(it => it.state !== 'done' && it.state !== 'fail')
    setStatus(anyActive
      ? '↩ 진행 중이던 블로그 생성을 이어받습니다… (다른 탭/페이지로 이동해도 백엔드에서 계속 처리됩니다)'
      : '↩ 이전에 만든 통합 블로그를 복원합니다…')
    await processRun()
    return true
  }

  // 다운로드 (단일 .html)
  downloadBtn.onclick = () => {
    const html = buildCombinedHtml({ forDownload: true })
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' })
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    const safe = (combinedTitle || '통합블로그').replace(/[\\/:*?"<>|]+/g, '_').slice(0, 60)
    const date = new Date().toISOString().slice(0, 10)
    a.download = `${safe}_${date}.html`
    a.click()
    setTimeout(() => URL.revokeObjectURL(a.href), 2000)
  }

  // 새 탭에서 바로보기
  openTabBtn.onclick = () => {
    const html = buildCombinedHtml({ forDownload: true })
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' })
    window.open(URL.createObjectURL(blob), '_blank')
  }

  // ─── 초기화: 모든 입력/진행/미리보기를 비우고 새 URL 입력 준비 ───
  function resetStudio() {
    clearRun()
    combinedSections = []
    combinedTitle = ''
    previewCard.hidden = true
    setProgress([])
    urlList.innerHTML = ''
    addUrlRow(); addUrlRow()   // 빈 입력칸 2개
    $('#blogTitle').value = ''
    setStatus('유튜브 URL을 추가하고 <strong>통합 블로그 생성</strong>을 누르세요. 여러 영상이 하나의 long blog로 합쳐집니다.')
    const firstInput = urlList.querySelector('.url-input')
    if (firstInput) firstInput.focus()
    window.scrollTo({ top: 0, behavior: 'smooth' })
  }
  $('#clearRunBtn').onclick = () => {
    const hasContent = (currentRun && currentRun.items && currentRun.items.length)
      || combinedSections.length > 0
    if (hasContent && !confirm('현재 내용(진행/결과)을 모두 지우고 새로 시작할까요?\n(이미 시작된 백엔드 작업 자체는 계속 처리됩니다)')) return
    resetStudio()
  }

  // ─── 시작 ───
  ;(async () => {
    await ensureBase()
    if (!isUnlocked()) {
      setStatus('🔒 먼저 <a href="/index.html">메인 페이지</a>에서 잠금을 해제한 뒤 이용하세요.')
      return
    }
    const resumed = await maybeResumeRun()
    if (!resumed) {
      setStatus('유튜브 URL을 추가하고 <strong>통합 블로그 생성</strong>을 누르세요. 여러 영상이 하나의 long blog로 합쳐집니다.')
    }
  })()
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {})
  }
</script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #090514 100%);
    color: #f1f5f9;
    margin: 0;
    padding: 24px 16px;
    min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    gap: 8px;
    flex-wrap: wrap;
  }
  h1.page-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0;
  }
  .nav-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap }
  button.icon {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13px;
    color: #e2e8f0;
    cursor: pointer;
    transition: all 0.2s;
  }
  button.icon:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.15); }
  a.icon { text-decoration: none; color: #cbd5e1 }

  .card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    margin-bottom: 20px;
  }
  .intro {
    font-size: 13px;
    color: #c084fc;
    background: rgba(139, 92, 246, 0.08);

  .row2 { display: flex; gap: 10px; align-items: flex-end; margin-top: 16px }

  #statusBox { font-size: 13px; color: #cbd5e1; line-height: 1.5; flex: 1; }

  #statusBox a { color: #a78bfa; text-decoration: none; }

  .status-row { display: flex; gap: 12px; align-items: center; margin-top: 14px }
  #clearRunBtn {
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 600;

    border-radius: 10px;
    border: 1px solid rgba(239, 68, 68, 0.25);

    cursor: pointer;

  }
  #clearRunBtn:hover { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: #fff; }

  #progressList { list-style: none; padding: 0; margin: 14px 0 0 }

    color: #e2e8f0;
  }
  #progressList .pg-icon { flex-shrink: 0 }
  #progressList .pg-label { font-weight: 600; color: #f1f5f9; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
  #progressList .pg-msg { color: #94a3b8; font-size: 12px; flex-shrink: 0 }
  #progressList .pg-done { background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.25); color: #34d399; }
  #progressList .pg-fail { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.25); color: #f87171; }

  .preview-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap }
  .preview-head h2 { font-size: 16px; margin: 0; color: #a78bfa; font-weight: 600; }
  .preview-actions { display: flex; gap: 8px; flex-wrap: wrap }
  .btn-primary {
    padding: 10px 16px;
    background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
    color: #fff;
    border: 0;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    box-shadow: 0 4px 10px rgba(124, 58, 237, 0.2);
    transition: all 0.2s;
  }
  .btn-primary:hover { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); box-shadow: 0 6px 16px rgba(124, 58, 237, 0.35); }
  .btn-secondary {
    padding: 10px 16px;
    background: rgba(255, 255, 255, 0.04);
    color: #cbd5e1;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.15); color: #fff; }
  #previewFrame { width: 100%; height: 70vh; border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; background: #fff }

  dialog {
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 20px;
    padding: 24px;
    max-width: min(560px, 92vw);

  dialog::backdrop { background: rgba(8, 5, 15, 0.75); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
  .settings-form > div { margin-bottom: 14px }

  .hint a { color: #a78bfa; text-decoration: none; }
  .hint a:hover { text-decoration: underline; }
  .key-row { display: flex; gap: 8px }
  .key-row button {
    padding: 10px 14px;
    background: rgba(255, 255, 255, 0.05);

    border-radius: 10px;
    cursor: pointer;
    color: #e2e8f0;
  }
  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 12px; }
  .row { display: flex; justify-content: space-between; align-items: center }

  /* ===== 로딩 중 엣지 그라데이션 글로우 (분석 진행 블럭) ===== */
  @property --edge-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
  .loading-glow { position: relative; z-index: 0; isolation: isolate; }
  .loading-glow::before {
    content: ""; position: absolute; inset: -2px; border-radius: inherit; padding: 2px;
    background: conic-gradient(from var(--edge-angle), #7c3aed, #a78bfa, #ec4899, #f472b6, #3b82f6, #60a5fa, #7c3aed);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); mask-composite: exclude;
    animation: edgeSpin 3.2s linear infinite; z-index: -1; pointer-events: none;
  }
  .loading-glow::after {
    content: ""; position: absolute; inset: -3px; border-radius: inherit;
    background: conic-gradient(from var(--edge-angle), #7c3aed, #a78bfa, #ec4899, #f472b6, #3b82f6, #60a5fa, #7c3aed);
    filter: blur(14px); opacity: 0.7; animation: edgeSpin 3.2s linear infinite; z-index: -2; pointer-events: none;
  }
  @keyframes edgeSpin { to { --edge-angle: 360deg; } }
  @supports not (background: conic-gradient(from 0deg, red, blue)) {
    .loading-glow::before, .loading-glow::after { animation: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 class="page-title">📚 멀티 영상 블로그 스튜디오</h1>
    <div class="nav-actions">
      <a class="icon" href="/index.html"><button class="icon" type="button">🎬 분석기로</button></a>
      <a class="icon" href="/reference-images.html" target="_blank" rel="noopener"><button class="icon" type="button">🖼 참조 이미지</button></a>
      <button id="cfgBtn" class="icon" type="button">⚙️ 설정</button>
    </div>
  </header>

  <div class="intro">
    여러 개의 유튜브 영상을 한 번에 분석해서 <strong>하나의 긴 블로그 글(이미지 포함)</strong>로 합쳐줍니다.
    각 영상의 <code>blog_long.html</code> 결과를 이어붙여 목차가 있는 통합 블로그를 만들고, 바로보기·다운로드할 수 있습니다.
  </div>

  <div class="card" id="studioCard">
    <label>📝 통합 블로그 제목 (선택)</label>
    <input type="text" id="blogTitle" placeholder="예) 2026년 AI 트렌드 모아보기" />

    <div style="margin-top:14px">
      <label>🎥 유튜브 URL 목록</label>
      <div id="urlList"></div>
      <button type="button" class="add-url" id="addUrlBtn">➕ 영상 추가</button>
    </div>

    <div class="row2">
      <div class="grow">
        <label>AI 품질</label>
        <select id="quality">
          <option value="flash">Flash (기본/빠름)</option>
          <option value="pro">Pro (고품질)</option>
        </select>
      </div>
      <button class="run-btn" id="runBtn" type="button">📚 통합 블로그 생성</button>
    </div>

    <div class="status-row">
      <div id="statusBox"></div>
      <button id="clearRunBtn" type="button">🔄 초기화</button>
    </div>
    <ul id="progressList"></ul>
  </div>

  <div class="card" id="previewCard" hidden>
    <div class="preview-head">
      <h2>👁 통합 블로그 미리보기</h2>
      <div class="preview-actions">
        <button class="btn-secondary" id="openTabBtn" type="button">↗ 새 탭에서 보기</button>
        <button class="btn-primary" id="downloadBtn" type="button">⬇ HTML 다운로드</button>
      </div>
    </div>
    <iframe id="previewFrame" title="통합 블로그 미리보기"></iframe>
  </div>
</div>

<!-- 설정 모달 (index.html 과 동일 cfg 공유) -->
<dialog id="settingsModal">
  <div class="row">
    <strong style="font-size:16px">⚙️ 설정</strong>
    <button id="cfgClose" class="icon" type="button">닫기</button>
  </div>
  <div class="settings-form" style="margin-top:12px">
    <div>
      <label>🌐 백엔드 서버 URL</label>
      <input id="cfgBase" type="url" placeholder="https://ytdlp-25y.fly.dev" />
      <div class="hint">비워두면 자동으로 현재 백엔드 주소를 찾습니다.</div>
    </div>
    <div>
      <label>🔑 Gemini API 키</label>
      <div class="key-row">
        <input id="cfgGeminiKey" type="password" placeholder="AIza..." />
        <button id="toggleKey" type="button">👁</button>
      </div>
      <div class="hint">
        <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a>에서 무료 발급. 이 브라우저에만 저장됩니다.
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" id="cfgCancel" type="button" onclick="document.getElementById('settingsModal').close()">취소</button>
      <button id="cfgSave" class="btn-primary" type="button">저장</button>
    </div>
  </div>
</dialog>
